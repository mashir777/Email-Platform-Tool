upstream email_platform_backend {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    client_max_body_size 25M;

    # Redirect HTTP to HTTPS (uncomment after SSL is configured)
    # return 301 https://$host$request_uri;

    location /static/ {
        alias /var/www/email_platform/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/email_platform/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://email_platform_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
    }
}

