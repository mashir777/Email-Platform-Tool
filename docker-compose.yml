# Email Platform Tool — Docker Compose (EC2 / production)
#
# Usage on EC2:
#   cp .env.docker.example .env
#   # edit .env (secret key, domain, SMTP, POSTGRES_PASSWORD...)
#   ./scripts/docker-up.sh
#   ./scripts/docker-down.sh
#
# Optional Reacher email verifier:
#   ./scripts/docker-up.sh --profile reacher

services:
  db:
    image: postgres:16-alpine
    container_name: email-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-email_platform}
      POSTGRES_USER: ${POSTGRES_USER:-email_platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-email_platform} -d ${POSTGRES_DB:-email_platform}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: email-platform-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: email-platform-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://${POSTGRES_USER:-email_platform}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-email_platform}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      REACHER_BACKEND_URL: http://reacher:8080
      GUNICORN_BIND: 0.0.0.0:8000
      FORWARDED_ALLOW_IPS: "*"
      RUN_MIGRATIONS: "1"
      RUN_COLLECTSTATIC: "1"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/admin/login/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: email-platform-worker
    restart: unless-stopped
    command: celery -A config worker --loglevel=INFO --concurrency=2
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://${POSTGRES_USER:-email_platform}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-email_platform}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      REACHER_BACKEND_URL: http://reacher:8080
      RUN_MIGRATIONS: "0"
      RUN_COLLECTSTATIC: "0"
    volumes:
      - media_data:/app/media
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: email-platform-beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://${POSTGRES_USER:-email_platform}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-email_platform}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      RUN_MIGRATIONS: "0"
      RUN_COLLECTSTATIC: "0"
    volumes:
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Same-origin: browser hits this host; nginx proxies /api to backend
        VITE_API_BASE_URL: ""
        VITE_TRACKING_PUBLIC_BASE_URL: ${TRACKING_PUBLIC_BASE_URL:-}
    container_name: email-platform-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    depends_on:
      - backend

  reacher:
    image: reacherhq/backend:latest
    container_name: email-platform-reacher
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    profiles:
      - reacher

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
  logs_data:
